<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nick Shastalov | Gallery</title>
    <meta
      name="description"
      content="A visual gallery of product design screens by Nick Shastalov."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./theme.js" defer></script>
  </head>
  <body class="gallery-page">
    <div class="site-shell">
      <button class="theme-toggle theme-toggle-floating" type="button" aria-label="Toggle theme">
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb"></span>
        </span>
      </button>

      <main class="gallery-main">
        <section class="gallery-hero">
          <p class="choice-kicker">Nick Shastalov's portfolio.</p>
          <h1>Gallery of screens</h1>
        </section>

        <section class="gallery-carousel" aria-label="Design gallery">
          <button class="gallery-nav gallery-nav-prev" type="button" aria-label="Previous image">‹</button>
          <div class="gallery-stage">
            <figure class="gallery-slide is-active"><img loading="lazy" src="./assets/gallery/next.png" alt="Texas Great Rig screen" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/floating.png" alt="Well check-up screen" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/360.png" alt="Design screen 360" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/ActiveTournaments.png" alt="Design screen Active Tournaments" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Boxes.png" alt="Design screen Boxes" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/cupsMain-1.png" alt="Design screen Cups main alternative" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/cupsMain.png" alt="Design screen Cups main" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Equinor Rig Efficiency  Dashboard - Default.png" alt="Design screen Equinor Rig Efficiency dashboard" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Equinor Rig Efficiency  Dashboard - details.png" alt="Design screen Equinor Rig Efficiency dashboard details" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Frame 2087326685.png" alt="Design screen Frame" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/hugest table.png" alt="Design screen Hugest table" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Improvements after research.png" alt="Design screen Improvements after research" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Lobby.png" alt="Design screen Lobby" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/MC.svg" alt="Design screen MC" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Mob 382.png" alt="Design screen Mob" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Mobile RTV.png" alt="Design screen Mobile RTV" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/rtwb 1.png" alt="Design screen RTWB 1" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/rtwb 2.png" alt="Design screen RTWB 2" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Start.png" alt="Design screen Start" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/tab 1.png" alt="Design screen Tab 1" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/tab 2 - ch.png" alt="Design screen Tab 2" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/tab 3 - ch2.png" alt="Design screen Tab 3" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/tab 4.png" alt="Design screen Tab 4" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Tablet RTV.png" alt="Design screen Tablet RTV" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Tablet RTV2.png" alt="Design screen Tablet RTV 2" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Tooltip.png" alt="Design screen Tooltip" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/Upgrade.png" alt="Design screen Upgrade" /></figure>
            <figure class="gallery-slide"><img loading="lazy" src="./assets/gallery/vertical.png" alt="Design screen Vertical" /></figure>
          </div>
          <button class="gallery-nav gallery-nav-next" type="button" aria-label="Next image">›</button>
        </section>
      </main>

      <a class="button button-primary gallery-back-button" href="./portfolio-choice.html">Back to choice</a>

      <div class="gallery-lightbox" aria-hidden="true">
        <button class="gallery-lightbox-close" type="button" aria-label="Close image">×</button>
        <img class="gallery-lightbox-img" alt="" />
      </div>
    </div>
  </body>
</html>
